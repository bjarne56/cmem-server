<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cmem-server · sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-md rounded-lg p-8 w-96">
    <h1 class="text-xl font-semibold mb-1">cmem-server</h1>
    <p class="text-sm text-gray-500 mb-6">admin console</p>

    {% match error %}
      {% when Some with (msg) %}
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded px-3 py-2 mb-4">
          {{ msg }}
        </div>
      {% when None %}
    {% endmatch %}

    <form method="post" action="/admin/login" class="space-y-4">
      <div>
        <label class="block text-xs uppercase tracking-wide text-gray-600 mb-1">username</label>
        <input name="username" autofocus value="{{ username }}"
               class="block w-full rounded border-gray-300 shadow-sm px-3 py-2 border focus:ring focus:ring-indigo-200" />
      </div>
      <div>
        <label class="block text-xs uppercase tracking-wide text-gray-600 mb-1">password</label>
        <input name="password" type="password"
               class="block w-full rounded border-gray-300 shadow-sm px-3 py-2 border focus:ring focus:ring-indigo-200" />
      </div>
      <button class="w-full bg-indigo-600 text-white rounded py-2 hover:bg-indigo-700 text-sm">
        sign in
      </button>
    </form>
  </div>
</body>
</html>
